name: Populate N8N Secrets

# Generates all N8N runtime secrets and stores them in GCP Secret Manager.
# Run ONCE after Terraform apply, before deploy-n8n.yml.
# Idempotent: adds a new version if the secret already exists.
#
# Evidence: project-life-130/populate-secrets.yml (F-IFR-002, F-HIST-003)
# Pattern: openssl rand -hex 32 for encryption/auth keys
#          openssl rand -base64 24 | tr -d '=\n' for passwords (N8N uppercase requirement)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  populate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account_email: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Generate and store N8N secrets
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail

          store_secret() {
            local name="$1"
            local value="$2"
            echo "::add-mask::$value"
            # Add new version (idempotent — overwrites previous value)
            printf '%s' "$value" | \
              gcloud secrets versions add "$name" \
                --project="$GCP_PROJECT" \
                --data-file=- 2>/dev/null || \
              printf '%s' "$value" | \
              gcloud secrets create "$name" \
                --project="$GCP_PROJECT" \
                --replication-policy=automatic \
                --data-file=-
            echo "  ✅ $name stored"
          }

          echo "Generating N8N secrets..."

          # N8N encryption key — protects saved credentials in the database.
          # CRITICAL: if lost, all saved N8N credentials are unrecoverable.
          store_secret "n8n-encryption-key" "$(openssl rand -hex 32)"

          # N8N owner account password (first admin user).
          # Created via POST /rest/owner/setup in deploy-n8n.yml.
          store_secret "n8n-owner-password" "$(openssl rand -base64 24 | tr -d '=\n')"

          # N8N secrets broker token — used by the agent to retrieve short-lived
          # credentials from N8N at runtime (ADR 0026 pattern from project-life-130).
          store_secret "n8n-secrets-broker-token" "$(openssl rand -hex 32)"

          echo ""
          echo "✅ All N8N secrets generated and stored in GCP Secret Manager."
          echo "   Next step: run deploy-n8n.yml to provision Railway + Cloudflare."
