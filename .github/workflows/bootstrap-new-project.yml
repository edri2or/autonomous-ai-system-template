name: Bootstrap New Project

# NOTE: This workflow requires pre-bootstrap.sh to have been run first,
# which provisions WIF (GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT_EMAIL)
# in this repo's GitHub Secrets via the GCP Cloud Shell.
#
# For initial project creation (first-time use), run from GCP Cloud Shell:
#   export GH_TOKEN="ghp_..."
#   bash bootstrap/pre-bootstrap.sh --gcp-project X --org Y --new-repo Z
#
# This workflow is for re-running bootstrap steps from GitHub Actions UI
# after WIF is already configured.

on:
  workflow_dispatch:
    inputs:
      new_repo:
        description: 'New repository name (e.g. my-autonomous-project)'
        required: true
        type: string
      gcp_project:
        description: 'GCP project ID'
        required: true
        type: string
      enable_railway:
        description: 'Enable Railway integration'
        required: false
        default: 'false'
        type: string
      enable_cloudflare:
        description: 'Enable Cloudflare integration'
        required: false
        default: 'false'
        type: string
      enable_n8n:
        description: 'Enable N8N integration'
        required: false
        default: 'false'
        type: string
      apply:
        description: 'Apply Terraform (check = apply, uncheck = plan only)'
        required: false
        default: false
        type: boolean

jobs:
  bootstrap:
    name: Bootstrap New Autonomous Project
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Keyless GCP authentication via WIF — no SA key ever stored in secrets.
      # WIF pool and bindings are provisioned by pre-bootstrap.sh (run once from Cloud Shell).
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.0'

      - name: Verify prerequisites
        env:
          GCP_PROJECT: ${{ inputs.gcp_project }}
        run: |
          bash scripts/verify-gate-001.sh "$GCP_PROJECT"
          bash scripts/verify-gate-002.sh "$GCP_PROJECT" || echo "GATE-002: WIF not pre-created — Terraform will create it"
          bash scripts/verify-gate-003.sh "$GCP_PROJECT" || echo "GATE-003: SA not pre-created — Terraform will create it"

      - name: Run bootstrap
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          AUTO_APPROVE: ${{ inputs.apply == true && 'true' || 'false' }}
          INPUT_ORG: ${{ github.repository_owner }}
          INPUT_GCP_PROJECT: ${{ inputs.gcp_project }}
          INPUT_NEW_REPO: ${{ inputs.new_repo }}
          INPUT_ENABLE_RAILWAY: ${{ inputs.enable_railway }}
          INPUT_ENABLE_CLOUDFLARE: ${{ inputs.enable_cloudflare }}
          INPUT_ENABLE_N8N: ${{ inputs.enable_n8n }}
        run: |
          bash bootstrap/bootstrap-new-project.sh \
            --org "$INPUT_ORG" \
            --gcp-project "$INPUT_GCP_PROJECT" \
            --new-repo "$INPUT_NEW_REPO" \
            --enable-railway "$INPUT_ENABLE_RAILWAY" \
            --enable-cloudflare "$INPUT_ENABLE_CLOUDFLARE" \
            --enable-n8n "$INPUT_ENABLE_N8N"

      - name: Post-bootstrap summary
        if: success() && inputs.apply == true
        env:
          INPUT_ORG: ${{ github.repository_owner }}
          INPUT_NEW_REPO: ${{ inputs.new_repo }}
        run: |
          echo ""
          echo "================================================================"
          echo "Bootstrap COMPLETE"
          echo "New repo: https://github.com/${INPUT_ORG}/${INPUT_NEW_REPO}"
          echo ""
          echo "NEXT STEPS:"
          echo "  1. Monitor Actions: https://github.com/${INPUT_ORG}/${INPUT_NEW_REPO}/actions"
          echo "  2. Confirm autonomous-control-plane.yml passes all ADR checks"
          echo "  3. Confirm docs/adr/0200-project-charter.md was created"
          echo "================================================================"
